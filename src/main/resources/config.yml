auth-server: "auth"

blocked-servers:
  - "admin"
  - "maintenance"

auth-required-servers:
  - "lobby"
  - "survival"
  - "creative"

custom-aliases:
  "/hub": "/server lobby"
  "/l": "/server lobby"
  "/spawn": "/server lobby"

player-hider:
  enabled: true
  hide-in-world: true
  hide-in-tablist: true
  game-mode: "ADVENTURE"
  messages:
    hidden: "&7You are now hidden."
    shown: "&aYou are no longer hidden."

fake-plugin:
  prefix: "&a&lNYX&f&lCORE"
  message: "&7Plugins (&a1&7): %plugin%"
  footer: ""

# Auth-server player protection (requires RCON on the auth backend server)
# Steps to enable:
#   1. In the auth server's server.properties set:
#        enable-rcon=true
#        rcon.port=25575
#        rcon.password=your_secret_password
#   2. Set enabled: true here and fill in the rcon password below.
auth-server-guard:
  enabled: false
  no-block-interact: true   # gamemode adventure — cannot break or place blocks
  no-damage: true           # resistance V effect — immune to all damage
  no-hunger: true           # saturation 255 effect — hunger bar never decreases
  rcon:
    host: "127.0.0.1"
    port: 25575
    password: "change-this"

bossbar:
  enabled: true
  timer: 60
  color: RED
  message: "&fYou only have &c%timer_bos% &fseconds to login"

messages:
  not-logged-in: "&cYou must login first!"
  command-blocked: "&cThis command is blocked!"
  server-blocked: "&cYou cannot connect to that server!"
  bossbar-timeout: "&cLogin time expired! Please reconnect."

settings:
  enabled: true
  debug: false
  login-cache-duration: 3600
  auto-alias:
    enabled: true
