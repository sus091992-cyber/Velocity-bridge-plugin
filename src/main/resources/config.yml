# Name of your authentication server (must match velocity.toml)
auth-server: "auth"

# Servers completely inaccessible to players
blocked-servers:
  - "admin"
  - "maintenance"

auth-required-servers:
  - "lobby"
  - "survival"
  - "creative"

# Custom command shortcuts
custom-aliases:
  "/hub": "/server lobby"
  "/l": "/server lobby"
  "/spawn": "/server lobby"

# Hide players on the auth server from everyone (tab list)
player-hider:
  enabled: true
  hide-in-tablist: true

# Fake /plugins response
fake-plugin:
  prefix: "&a&lNYX&f&lCORE"
  message: "&7Plugins (&a1&7): %plugin%"
  footer: ""

# RaidBar countdown timer shown to players on the auth server
#
# color options   : PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE
# overlay options : PROGRESS, NOTCHED_6, NOTCHED_10, NOTCHED_12, NOTCHED_20
raidbar:
  enabled: true
  timer: 60
  color: RED
  overlay: NOTCHED_6
  message: "&fYou only have &c%timer_bos% &fseconds to login"

# Send player to a specific server after successful login or register
after-login:
  send: true
  server: "lobby"

# Player-facing messages
messages:
  not-logged-in: "&cYou must login first!"
  command-blocked: "&cThis command is blocked!"
  server-blocked: "&cYou cannot connect to that server!"
  raidbar-timeout: "&cLogin time expired! Please reconnect."

settings:
  auto-alias:
    enabled: true
