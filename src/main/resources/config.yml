auth-server: "auth"

blocked-servers:
  - "admin"
  - "maintenance"

auth-required-servers:
  - "lobby"
  - "survival"
  - "creative"

custom-aliases:
  "/hub": "/server lobby"
  "/l": "/server lobby"
  "/spawn": "/server lobby"

# Hide players on the auth server from everyone (tab list + world)
# No player on auth can see any other player — not even other auth players.
player-hider:
  enabled: true
  hide-in-tablist: true

fake-plugin:
  prefix: "&a&lNYX&f&lCORE"
  message: "&7Plugins (&a1&7): %plugin%"
  footer: ""

# RaidBar countdown timer shown to players while on the auth server
raidbar:
  enabled: true
  timer: 60
  color: PINK
  message: "&fYou only have &c%timer_bos% &fseconds to login"

messages:
  not-logged-in: "&cYou must login first!"
  command-blocked: "&cThis command is blocked!"
  server-blocked: "&cYou cannot connect to that server!"
  raidbar-timeout: "&cLogin time expired! Please reconnect."

settings:
  enabled: true
  debug: false
  login-cache-duration: 3600
  auto-alias:
    enabled: true
