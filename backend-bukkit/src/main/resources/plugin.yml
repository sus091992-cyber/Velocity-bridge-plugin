name: AuthBridgeBukkit
version: 1.0.0
main: com.niongroq.authbridge.bukkit.AuthBridgeBukkit
# No api-version pin on purpose: Paper still loads plugins without one
# (legacy compatibility mode), which avoids the server rejecting this jar
# over a version mismatch. Targets Paper 1.17+ (see README "Version
# compatibility" for why 1.17 is the floor and what that guarantee covers).
authors: [S1MPLE]
description: "Backend companion for the Velocity AuthBridge plugin: reports AuthMe login/register to the proxy and vanishes players from each other on this server."
softdepend: [AuthMe]
