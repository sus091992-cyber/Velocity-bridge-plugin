name: Build & Release AuthBridge

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn package -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuthBridge-jar
          path: target/AuthBridge-*.jar
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "AuthBridge ${{ github.ref_name }}"
          body: |
            ## AuthBridge ${{ github.ref_name }}

            ### تغییرات این نسخه / Changelog
            - **PlayerHider fixed**: repeating 1-second enforcement task wins the race against backend tab-list packet flood — auth players are now truly invisible
            - **RaidBar fixed**: 600ms startup delay ensures the bar appears after full backend connection
            - **After-login redirect**: send player to a configured server after login/register (`after-login.send` + `after-login.server` in config.yml)
            - **BossBar → RaidBar** rename, RCON removed

            ### نصب / Install
            Copy `AuthBridge-*.jar` into your Velocity `plugins/` folder and restart.
          files: target/AuthBridge-*.jar
          draft: false
          prerelease: false
